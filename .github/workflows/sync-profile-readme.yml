name: Sync Organization Profile README

on:
  push:
    branches: [main]
    paths:
      - 'CNAME'
      - 'assets/**'
      - 'css/**'
      - 'data/**'
      - 'index.html'
      - 'js/**'
      - 'scripts/generate-profile-readme.cjs'
      - '.github/workflows/sync-profile-readme.yml'
  workflow_dispatch:

concurrency:
  group: sync-organization-profile-readme
  cancel-in-progress: true

jobs:
  sync-profile-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout website repository
        uses: actions/checkout@v4

      - name: Validate site config
        run: |
          test -f data/config.json
          jq empty data/config.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check profile repository token
        id: profile-token
        env:
          GH_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::PROFILE_REPO_TOKEN is not configured. Skipping DevRelJam/.github profile README sync."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh api repos/DevRelJam/.github >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::PROFILE_REPO_TOKEN cannot access DevRelJam/.github. Skipping profile README sync."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout organization profile repository
        if: steps.profile-token.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: DevRelJam/.github
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile-repo

      - name: Generate organization profile README
        if: steps.profile-token.outputs.available == 'true'
        run: node scripts/generate-profile-readme.cjs

      - name: Check for profile README changes
        if: steps.profile-token.outputs.available == 'true'
        id: verify-changed-files
        run: |
          cd profile-repo
          if git diff --quiet -- profile/README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff -- profile/README.md
          fi

      - name: Commit and push organization profile README
        if: steps.profile-token.outputs.available == 'true' && steps.verify-changed-files.outputs.changed == 'true'
        run: |
          cd profile-repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add profile/README.md
          git commit -m "Sync profile README from website config"
          git push
